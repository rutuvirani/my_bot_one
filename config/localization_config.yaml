slam_toolbox:
  ros__parameters:
    # Localization mode - uses existing map
    mode: localization
    
    # Map file to load (you'll update this path)
    map_file_name: /home/virani/learn_ros_ws/src/my_bot_one/recorded_map/slam_map
    map_start_at_dock: false
    map_start_pose: [0.0, 0.0, 0.0]  # Set this to match your Gazebo robot spawn pose
    
    # Frame configuration
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    
    # Use sim time for Gazebo
    use_sim_time: true
    
    # Localization parameters
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2
    scan_buffer_size: 10
    
    # Transform publishing
    transform_publish_period: 0.02
    tf_buffer_duration: 30.0
    transform_timeout: 0.2
    
    # Map parameters
    resolution: 0.05
    max_laser_range: 12.0
    map_update_interval: 60.0  # Rarely republish map in localization mode to prevent costmap resizing
    
    # Solver configuration
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    
    # Localization-specific parameters
    do_loop_closing: false  # Not needed for localization
    
    # Scan matching parameters for localization
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    
    # Correlation parameters
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1
    
    # Performance settings
    debug_logging: false
    throttle_scans: 1
    enable_interactive_mode: true