amcl:
  ros__parameters:
    use_sim_time: true
    
    # Overall filter parameters
    min_particles: 500
    max_particles: 2000
    kld_err: 0.05
    kld_z: 0.99
    update_min_d: 0.2
    update_min_a: 0.5236  # π/6 radians
    resample_interval: 1
    transform_tolerance: 1.0
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_a: 0.0
    initial_cov_xx: 0.5 * 0.5
    initial_cov_yy: 0.5 * 0.5
    initial_cov_aa: (1.5708 / 6.0) * (1.5708 / 6.0)
    
    # Laser model parameters
    laser_min_range: 0.3
    laser_max_range: 12.0
    laser_max_beams: 60
    laser_z_hit: 0.5
    laser_z_short: 0.05
    laser_z_max: 0.05
    laser_z_rand: 0.5
    laser_sigma_hit: 0.2
    laser_lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_model_type: "likelihood_field"
    
    # Odometry model parameters
    odom_model_type: "diff"
    odom_alpha1: 0.2
    odom_alpha2: 0.2
    odom_alpha3: 0.8
    odom_alpha4: 0.2
    odom_alpha5: 0.1
    
    # Frame and topic parameters
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    global_frame_id: "map"
    scan_topic: "scan"
    
    # Transform publication
    tf_broadcast: true
    
    # Particle filter parameters
    pf_err: 0.05
    pf_z: 0.99
    
    # Save pose parameters
    save_pose_rate: 0.5
    
    # Set initial pose estimate
    set_initial_pose: false